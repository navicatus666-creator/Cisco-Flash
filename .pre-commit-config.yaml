repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python -m pytest
        language: system
        pass_filenames: false
        stages: [manual]
      - id: mypy
        name: mypy
        entry: python -m mypy ciscoautoflash
        language: system
        pass_filenames: false
        stages: [manual]
      - id: bandit
        name: bandit
        entry: python -m bandit -r ciscoautoflash
        language: system
        pass_filenames: false
        stages: [manual]
