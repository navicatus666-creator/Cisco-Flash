name = "full_install_verify"
display_name = "Полный dry run: scan -> stage1 -> stage2 -> stage3"
action = "full"
description = "Полный replay dry run для pre-hardware smoke: scan, Этап 1, Этап 2 и Этап 3 в одной сессии."
firmware_name = "c2960x-universalk9-tar.152-7.E13.tar"

[target]
id = "COM5"
label = "COM5"

[target.metadata]
description = "USB Serial"

[probe]
available = true
status_message = "Коммутатор готов (Switch#)"
prompt_type = "priv"
connection_state = "ready"
recommended_next_action = "Запустите полный dry run."
score = 120
raw_preview = "Switch#"

[[transports]]
name = "scan-details"
default_output = ""

[[transports.read_until]]
marker = "Switch#"
buffer = "Switch#"

[transports.commands]
"terminal length 0" = ""
"show version" = "Cisco IOS Software, Version 15.2(7)E13\nModel Number                    : WS-C2960X-48FPS-L\n"
"dir flash:" = "123456789 bytes total (98765432 bytes free)"
"dir usbflash0:" = "Directory of usbflash0:/\n1  -rw-  c2960x-universalk9-tar.152-7.E13.tar"

[[transports]]
name = "stage1-primary"
default_output = ""

[[transports.read_until]]
marker = "Switch#"
buffer = "Switch#"

[[transports.read_until]]
marker = "[confirm]"
buffer = "[confirm]"

[[transports.read_until]]
marker = ""
buffer = "Would you like to enter the initial configuration dialog? [yes/no]:"

[[transports.read_until]]
marker = "Switch#"
buffer = "Switch#"

[transports.commands]
"show startup-config" = "startup-config is not present"
"dir flash:" = "Directory of flash:/\n2  -rw-  100 config.text"
"reload" = ""

[[transports]]
name = "stage2-primary"
default_output = ""
read_available_chunks = ["examining\nextracting\ninstalling\ndeleting\nsignature\nall software images installed\n"]

[[transports.read_until]]
marker = "Switch#"
buffer = "Switch#"

[[transports.read_until]]
marker = "Switch#"
buffer = "Switch#"

[transports.commands]
"show flash:" = "123456789 bytes total (98765432 bytes free)"
"dir usbflash0:" = "Directory of usbflash0:/\n1  -rw-  c2960x-universalk9-tar.152-7.E13.tar"

[[transports]]
name = "stage3-primary"
default_output = "synthetic replay output"

[[transports.read_until]]
marker = "Switch#"
buffer = "Switch#"

[transports.commands]
"terminal length 0" = ""
"show version" = "Cisco IOS Software, Version 15.2(7)E13\nSystem image file is \"flash:/image.bin\"\nModel Number                    : WS-C2960X-48FPS-L\n"
"show boot" = "BOOT variable = flash:/image.bin"
"dir flash:" = "123456789 bytes total (98765432 bytes free)"
