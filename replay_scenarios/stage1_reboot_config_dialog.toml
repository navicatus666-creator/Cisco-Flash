name = "stage1_reboot_config_dialog"
action = "stage1"
description = "Этап 1 с initial config dialog после reload."

[target]
id = "COM5"
label = "COM5"

[target.metadata]
description = "USB Serial"

[probe]
available = true
status_message = "Коммутатор готов (Switch#)"
prompt_type = "priv"
connection_state = "ready"
recommended_next_action = "Запустите этап 1 или этап 3."
score = 120
raw_preview = "Switch#"

[[transports]]
name = "scan-details"
default_output = ""

[[transports.read_until]]
marker = "Switch#"
buffer = "Switch#"

[transports.commands]
"terminal length 0" = ""
"show version" = "Cisco IOS Software, Version 15.2(7)E13\nModel Number                    : WS-C2960X-48FPS-L\n"
"dir flash:" = "123456789 bytes total (98765432 bytes free)"
"dir usbflash0:" = "Error opening usbflash0:"
"dir usbflash1:" = "Error opening usbflash1:"

[[transports]]
name = "stage1-primary"
default_output = ""

[[transports.read_until]]
marker = "Switch#"
buffer = "Switch#"

[[transports.read_until]]
marker = "[confirm]"
buffer = "[confirm]"

[[transports.read_until]]
marker = ""
buffer = "Would you like to enter the initial configuration dialog? [yes/no]:"

[[transports.read_until]]
marker = "Switch#"
buffer = "Switch#"

[transports.commands]
"show startup-config" = "startup-config is not present"
"dir flash:" = "Directory of flash:/\n2  -rw-  100 config.text"
"reload" = ""
