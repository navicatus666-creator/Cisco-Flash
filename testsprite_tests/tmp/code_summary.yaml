project:
  name: ciscoautoflash
  version: 4.1.0
  type: desktop_application
  platform: windows
  language: python
  description: CiscoAutoFlash desktop tool for Cisco 2960-X serial and USB workflows.

tech_stack:
  runtime:
    - python 3.14
    - ttkbootstrap
    - pyserial
  optional:
    - netmiko
    - paramiko
    - ntc-templates
  packaging:
    - pyinstaller
  testing:
    - unittest

entrypoints:
  main_script: C:\PROJECT\main.py
  console_script: ciscoautoflash.ui.app:main

modules:
  - path: C:\PROJECT\ciscoautoflash\ui
    role: Russian-first desktop dashboard and operator workflow UI
  - path: C:\PROJECT\ciscoautoflash\core
    role: Workflow orchestration, reporting, session artifacts, transports
  - path: C:\PROJECT\ciscoautoflash\replay
    role: Demo and replay harness for pre-hardware validation
  - path: C:\PROJECT\replay_scenarios
    role: Canned scan, stage1, stage2, stage3 and full-install fixtures
  - path: C:\PROJECT\tests
    role: Unit and integration regression coverage
  - path: C:\PROJECT\docs\pre_hardware
    role: Hardware smoke runbooks and readiness documentation

features:
  - Serial-first operator workflow for Cisco 2960-X over COM and USB
  - Dashboard with preflight, operator status, target selection, and diagnostics tabs
  - Demo mode for click-smoke without hardware
  - Replay-backed scenarios for scan, stage1, stage2, and stage3 verification
  - Session artifacts including logs, transcripts, reports, manifests, and exportable bundles
  - Hidden backend-only SSH and SCP transport support prepared for later integration
  - Portable Windows field bundle already built for real-hardware smoke use

artifact_locations:
  runtime_root: '%LOCALAPPDATA%\CiscoAutoFlash'
  demo_root: '%LOCALAPPDATA%\CiscoAutoFlash\demo'

quality_state:
  current_goal: pre-hardware stabilization and demo GUI self-test
  hardware_target: Cisco 2960-X
  notes:
    - Real-hardware scope is serial/USB only for the current phase
    - SSH transport exists but is not exposed in the operator UI yet
